<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicios de Azure</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;

      background:
      linear-gradient(rgba(10,10,20,0.85), rgba(10,10,20,0.90)),
      url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070&auto=format&fit=crop');

      background-size: cover;
      background-position: center;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow-x: hidden;
    }

    .contenedor{
      width: 95%;
      max-width: 1100px;

      background: rgba(255,255,255,0.06);

      border: 1px solid rgba(255,255,255,0.08);

      backdrop-filter: blur(12px);

      border-radius: 25px;

      padding: 50px 40px;

      box-shadow: 0 10px 40px rgba(0,0,0,0.4);

      text-align: center;
    }

    .titulo{
      color: white;
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .subtitulo{
      color: #cfcfcf;
      margin-bottom: 45px;
      font-size: 1.1rem;
    }

    .grid-botones{
      display: grid;

      grid-template-columns: repeat(auto-fit, minmax(180px,1fr));

      gap: 20px;
    }

    .servicio-btn{
      text-decoration: none;

      background: rgba(255,255,255,0.08);

      border: 1px solid rgba(255,255,255,0.10);

      color: white;

      padding: 18px;

      border-radius: 18px;

      font-size: 1rem;
      font-weight: 600;

      transition: 0.3s ease;

      backdrop-filter: blur(8px);
    }

    .servicio-btn:hover{
      transform: translateY(-5px);

      background: #6d28d9;

      box-shadow: 0 8px 25px rgba(109,40,217,0.45);

      color: white;
    }

    .boton-chat{
      position: fixed;

      bottom: 25px;
      right: 25px;

      width: 65px;
      height: 65px;

      background: linear-gradient(135deg,#7c3aed,#5b21b6);

      border-radius: 50%;

      display: flex;
      justify-content: center;
      align-items: center;

      box-shadow: 0 8px 25px rgba(124,58,237,0.5);

      transition: 0.3s ease;

      z-index: 999;
    }

    .boton-chat img{
      width: 32px;
      height: 32px;
    }

    .boton-chat:hover{
      transform: scale(1.1) rotate(5deg);
    }

    @media(max-width:768px){

      .titulo{
        font-size: 2rem;
      }

      .contenedor{
        padding: 35px 20px;
      }

    }

  </style>

</head>

<body>

  <div class="contenedor">
    <h1 class="titulo">SERVICIOS DE AZURE</h1>
    <p class="subtitulo"> Plataforma inteligente de análisis y procesamiento con IA </p>
    <div class="grid-botones">
      <a href="./analisis/IndexAna.html" class="servicio-btn"> Análisis </a>
      <a href="./anonimacion/index.html" class="servicio-btn"> Anonimación </a>
      <a href="./deteccion/indexDetect.html" class="servicio-btn">Detección </a>
      <a href="./extraccion/indexExtra.html" class="servicio-btn"> Extracción </a>
      <a href="./imagen/indexImage.html" class="servicio-btn"> Imagen</a>
      <a href="./ocr/indexOcr.html" class="servicio-btn"> OCR</a>
      <a href="./preguntas/indexPregun.html" class="servicio-btn"> Preguntas</a>
      <a href="./resumen/indexResu.html" class="servicio-btn"> Resumen</a>
      <a href="./sentimientos/indexSenti.html" class="servicio-btn">Sentimientos</a>
    </div>
  </div>

  <a href="./chatgpt/indexgpt.html" class="boton-chat">
     <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png" alt="Chat"> </a>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

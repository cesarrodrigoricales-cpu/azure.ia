<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Azure IA - Análisis de Imagen</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <div class="container">

    <div class="header">
      <h2>Servicios de Azure IA — Imagen</h2>

      <p>
        Analiza imágenes mediante inteligencia artificial utilizando Azure AI Vision.
      </p>
    </div>

    <div class="form-group">

      <label for="imageURL">
        URL de la imagen
      </label>

      <input 
        type="text" 
        id="imageURL" 
        placeholder="https://ejemplo.com/imagen.jpg"
        oninput="previsualizarImagen()"
      >

    </div>

    <div class="botones">
      <button class="btn-imagen" onclick="analizarImagen()">
        Analizar Imagen
      </button>
    </div>

    <div class="panel">

      <div class="preview-box" id="previewBox">

        <span class="preview-title">
        </span>

        <img id="preview" src="" alt="Preview">

      </div>

      <div class="resultado-box" id="resultado">

        <span class="resultado-title">
          Resultado del análisis
        </span>

        <div class="resultado-texto">
          El resultado aparecerá aquí...
        </div>

      </div>

    </div>

  </div>

  <script src="./scripts.js"></script>

</body>
</html>

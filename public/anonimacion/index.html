<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azure IA - Anonimación</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <div class="container">

    <h2>Azure IA — Anonimación</h2>

    <p>
      Ingresa un texto para detectar y anonimizar información sensible
      utilizando inteligencia artificial.

    <label for="texto">Texto a analizar</label>

    <textarea

    <button onclick="hacerPregunta()">
      Analizar Texto
    </button>

    <div id="resultado"></div>

  </div>

  <script src="./script.js"></script>

</body>
</html>

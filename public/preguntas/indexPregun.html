<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Azure IA - Preguntas Inteligentes</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <div class="container">

    <div class="header">

      <h2>Azure IA — Preguntas Inteligentes</h2>

      <p>
        Analiza información y realiza preguntas basadas en el contenido proporcionado utilizando inteligencia artificial.
      </p>

    </div>

    <!-- TEXTO -->
    <div class="form-group">

      <label for="texto">
        Texto a analizar
      </label>

      <textarea 
        id="texto"
        placeholder="Escribe o pega el texto aquí..."
      ></textarea>

    </div>

    <!-- PREGUNTA -->
    <div class="form-group">

      <label for="pregunta">
        Pregunta relacionada al texto
      </label>

      <textarea 
        id="pregunta"
        placeholder="Escribe una pregunta basada en el texto anterior..."
      ></textarea>

    </div>

    <button onclick="hacerPregunta()">
      Responder Pregunta
    </button>

    <div id="resultado">
      La respuesta generada aparecerá aquí...
    </div>

  </div>

  <script src="./script.js"></script>

</body>
</html>
